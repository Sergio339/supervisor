<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Module</title>
    <style>
        /* ─── Professional Design – No Emojis, Clean & Minimal ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f5f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            transition: all 0.2s ease;
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 28px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e9edf2;
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b1a2e;
        }

        .app-badge {
            font-size: 0.65rem;
            font-weight: 500;
            color: #5e6f8d;
            background: #edf2f7;
            padding: 4px 12px;
            border-radius: 100px;
            letter-spacing: 0.02em;
        }

        /* Loading */
        .loading-state {
            color: #5e6f8d;
            font-size: 0.9rem;
            padding: 24px 0 16px;
            text-align: center;
            font-weight: 450;
        }

        .loading-state.error {
            color: #b33a3a;
        }

        /* Search section */
        .search-section {
            margin-top: 4px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 450;
            color: #1e293b;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            margin-bottom: 14px;
        }

        .input-field:focus {
            border-color: #2c6b9e;
            box-shadow: 0 0 0 3px rgba(44, 107, 158, 0.12);
            background: #ffffff;
        }

        .input-field::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #ffffff;
            background: #2c6b9e;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.01em;
            width: 100%;
        }

        .btn:hover {
            background: #1f4f77;
            box-shadow: 0 4px 12px rgba(44, 107, 158, 0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #1e7b4a;
        }

        .btn-secondary:hover {
            background: #14633b;
            box-shadow: 0 4px 12px rgba(30, 123, 74, 0.2);
        }

        /* Result card */
        .result-card {
            margin-top: 24px;
            padding: 18px 20px;
            background: #f8fafc;
            border-radius: 14px;
            border-left: 4px solid #2c6b9e;
            font-size: 0.92rem;
            line-height: 1.6;
            color: #1e293b;
            text-align: left;
        }

        .result-card.error {
            border-left-color: #b33a3a;
            background: #fdf5f5;
        }

        .result-card p {
            margin-bottom: 4px;
        }

        .result-card strong {
            font-weight: 600;
            color: #0b1a2e;
        }

        .result-card .not-found {
            color: #b33a3a;
            font-weight: 500;
        }

        .result-card .hint-text {
            color: #b37a2e;
        }

        /* Census section */
        .census-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e9edf2;
        }

        .census-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
            display: block;
            margin-bottom: 8px;
        }

        .census-section .input-field {
            margin-bottom: 14px;
        }

        /* Status messages */
        .toast-message {
            background: #1e2b3c;
            color: #f0f7ff;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 450;
            margin-top: 16px;
            display: inline-block;
            max-width: 100%;
            word-break: break-word;
        }

        .toast-message.error-toast {
            background: #b33a3a;
        }

        .toast-message.warning-toast {
            background: #b37a2e;
        }

        .toast-message.hidden {
            display: none;
        }

        /* Error detail box */
        .error-detail {
            font-size: 0.8rem;
            background: #fdf5f5;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 14px;
            color: #a93226;
            border: 1px solid #f5c6cb;
            text-align: left;
            line-height: 1.5;
        }

        .error-detail.hidden {
            display: none;
        }

        .error-detail strong {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .error-detail .detail-meta {
            margin-top: 6px;
            font-size: 0.75rem;
            opacity: 0.8;
        }

        /* Utility */
        .hidden {
            display: none !important;
        }

        .mt-1 { margin-top: 8px; }
        .mt-2 { margin-top: 16px; }
        .w-100 { width: 100%; }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 28px 20px; }
            .app-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="app-header">
        <span class="app-title">Supervisor</span>
        <span class="app-badge">v1.0</span>
    </header>

    <!-- LOADING -->
    <div id="loading" class="loading-state">Loading user data ...</div>

    <!-- SEARCH -->
    <div id="searchBox" class="search-section hidden">
        <input type="text" id="userInput" class="input-field" placeholder="Enter User ID (e.g. U001)">
        <button class="btn" onclick="searchUser()">Search Profile</button>
    </div>

    <!-- PROFILE RESULT -->
    <div id="result" class="result-card hidden"></div>

    <!-- CENSUS SECTION -->
    <div id="censusSection" class="census-section hidden">
        <label class="census-label">Census House Number</label>
        <input type="text" id="censusInput" class="input-field" placeholder="e.g. H-12, 45/A">
        <button class="btn btn-secondary" onclick="saveCensus()">Submit Entry</button>
    </div>

    <!-- STATUS & ERROR -->
    <div id="statusMessage" class="toast-message hidden"></div>
    <div id="errorDetail" class="error-detail hidden"></div>

</div>

<script>
    // ─── DIRECT GOOGLE APPS SCRIPT ENDPOINT ──────────────────────────
    const GAS_URL = "https://corsproxy.io/?" + encodeURIComponent("https://script.google.com/macros/s/AKfycbwIUiDZr5e4AkFp3RYSqfATzsU7uxc9_S3ssKic2SzxKxIi8DM0TLz9_2J30TXSQq8/exec");

    // ─── STATE ────────────────────────────────────────────────────────
    let userData = [];
    let currentUserId = "";

    // ─── DOM REFS ────────────────────────────────────────────────────
    const loadingEl = document.getElementById('loading');
    const searchBox = document.getElementById('searchBox');
    const userInput = document.getElementById('userInput');
    const resultDiv = document.getElementById('result');
    const censusSection = document.getElementById('censusSection');
    const censusInput = document.getElementById('censusInput');
    const statusMsg = document.getElementById('statusMessage');
    const errorDetail = document.getElementById('errorDetail');

    // ─── HELPERS ──────────────────────────────────────────────────────
    function showStatus(text, type = 'info') {
        statusMsg.classList.remove('hidden', 'error-toast', 'warning-toast');
        statusMsg.textContent = text;
        if (type === 'error') {
            statusMsg.classList.add('error-toast');
        } else if (type === 'warning') {
            statusMsg.classList.add('warning-toast');
        } else {
            statusMsg.style.background = '#1e2b3c';
            statusMsg.style.color = '#f0f7ff';
        }
        clearTimeout(statusMsg._timer);
        statusMsg._timer = setTimeout(() => {
            statusMsg.classList.add('hidden');
        }, 6000);
    }

    function showErrorDetail(title, message, details = '') {
        errorDetail.classList.remove('hidden');
        errorDetail.innerHTML = `
            <strong>${title}</strong>
            <div>${message}</div>
            ${details ? `<div class="detail-meta">${details}</div>` : ''}
        `;
        clearTimeout(errorDetail._timer);
        errorDetail._timer = setTimeout(() => {
            errorDetail.classList.add('hidden');
        }, 12000);
    }

    function hideErrorDetail() {
        errorDetail.classList.add('hidden');
    }

    // ─── LOAD USER DATA ──────────────────────────────────────────────
    function loadUserData() {
        loadingEl.classList.remove('hidden', 'error');
        loadingEl.textContent = 'Loading user data ...';
        searchBox.classList.add('hidden');
        resultDiv.classList.add('hidden');
        censusSection.classList.add('hidden');
        hideErrorDetail();

        fetch(`${GAS_URL}?action=getUserData`)
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status} ${res.statusText}`);
                }
                return res.json();
            })
            .then(data => {
                if (Array.isArray(data)) {
                    userData = data;
                } else if (data && typeof data === 'object' && Array.isArray(data.data)) {
                    userData = data.data;
                } else {
                    throw new Error('Unexpected data format from GAS');
                }

                loadingEl.classList.add('hidden');
                searchBox.classList.remove('hidden');
                // showStatus(`Loaded ${userData.length} users`, 'info');
            })
            .catch(err => {
                console.error('Load error:', err);
                loadingEl.textContent = 'Error loading data.';
                loadingEl.classList.add('error');
                showStatus('Failed to load user data', 'error');
                showErrorDetail(
                    'Data Load Failed',
                    'Could not fetch user list from Google Apps Script.',
                    `Error: ${err.message}. Check that the GAS URL is correct and CORS is enabled.`
                );
            });
    }

    // ─── SEARCH USER ──────────────────────────────────────────────────
    window.searchUser = function() {
        const input = userInput.value.trim();
        resultDiv.classList.remove('hidden');
        resultDiv.className = 'result-card';
        hideErrorDetail();

        if (!input) {
            resultDiv.innerHTML = '<span class="hint-text">Please enter a User ID.</span>';
            censusSection.classList.add('hidden');
            return;
        }

        const user = userData.find(u => u.id && u.id.toString().toLowerCase() === input.toLowerCase());
        if (user) {
            currentUserId = user.id;
            resultDiv.className = 'result-card';
            
            // Get census value - check multiple possible field names
            const censusValue = user.censusHouse || user.censusHouseNo || user.census || '';
            const displayCensus = censusValue && censusValue.toString().trim() !== '' ? censusValue : '00';
            
            let html = `
                <p><strong>Functionary:</strong> ${user.typeOfFunctionary || '—'}</p>
                <p><strong>Name:</strong> ${user.name || '—'}</p>
                <p><strong>District / M.Corp.:</strong> ${user.district || '—'}</p>
                <p><strong>Sub-District:</strong> ${user.subDistrict || '—'}</p>
                <p><strong>Census House:</strong> ${displayCensus}</p>
            `;
            
            if (user.town && user.town.toString().trim() !== '') {
                html += `<p><strong>Town:</strong> ${user.town}</p>`;
            }
            
            resultDiv.innerHTML = html;
            censusSection.classList.remove('hidden');
            censusInput.value = '';
            // showStatus(`Profile: ${user.name || user.id}`, 'info');
        } else {
            resultDiv.className = 'result-card error';
            resultDiv.innerHTML = `<span class="not-found">User ID "${input}" not found.</span>`;
            censusSection.classList.add('hidden');
            showStatus('User not found', 'warning');
        }
    };

    // ─── SAVE CENSUS DATA ────────────────────────────────────────────
    window.saveCensus = function() {
        const houseNo = censusInput.value.trim();
        if (!houseNo) {
            alert('Please enter a House Number.');
            return;
        }
        if (!currentUserId) {
            alert('No user selected. Please search a valid profile first.');
            return;
        }

        const payload = {
            action: 'saveCensusData',
            userId: currentUserId,
            houseNo: houseNo
        };

        const btn = document.querySelector('#censusSection .btn-secondary');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Saving ...';
        hideErrorDetail();

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);

        fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: controller.signal
        })
            .then(res => {
                clearTimeout(timeoutId);
                if (!res.ok) {
                    return res.text().then(text => {
                        let errorMsg = `HTTP ${res.status} ${res.statusText}`;
                        try {
                            const json = JSON.parse(text);
                            if (json.message) errorMsg = json.message;
                        } catch (_) {
                            if (text) errorMsg = text.substring(0, 200);
                        }
                        throw new Error(errorMsg);
                    });
                }
                return res.json();
            })
            .then(result => {
                btn.disabled = false;
                btn.textContent = originalText;
                if (result && result.success === true) {
                    showStatus('Census data saved successfully.', 'info');
                    censusInput.value = '';
                    userInput.value = '';
                    resultDiv.classList.add('hidden');
                    censusSection.classList.add('hidden');
                    currentUserId = '';
                    hideErrorDetail();
                } else {
                    const msg = result?.message || 'Unknown error from GAS';
                    showStatus('Error: ' + msg, 'error');
                    showErrorDetail(
                        'Save Failed',
                        msg,
                        'The Google Apps Script returned an error status.'
                    );
                }
            })
            .catch(err => {
                clearTimeout(timeoutId);
                btn.disabled = false;
                btn.textContent = originalText;

                console.error('Save error:', err);

                let errorTitle = 'Network Error';
                let errorMessage = 'Failed to connect to Google Apps Script.';
                let errorDetails = '';

                if (err.name === 'AbortError') {
                    errorTitle = 'Request Timeout';
                    errorMessage = 'The request took too long (over 15 seconds).';
                    errorDetails = 'The GAS endpoint may be slow or unavailable.';
                } else if (err.message.includes('Failed to fetch')) {
                    errorTitle = 'Connection Failed';
                    errorMessage = 'Cannot reach the Google Apps Script endpoint.';
                    errorDetails = 'Possible causes:\n- CORS not enabled on the GAS deployment\n- Incorrect script URL\n- Network blockage (firewall/VPN)\n- GAS script is not published or deployed';
                } else if (err.message.includes('HTTP')) {
                    errorTitle = 'Server Error';
                    errorMessage = err.message;
                    errorDetails = 'The GAS endpoint returned an HTTP error status.';
                } else {
                    errorTitle = 'Unexpected Error';
                    errorMessage = err.message || 'Unknown error';
                    errorDetails = 'Check the browser console for more details.';
                }

                showStatus('Error: ' + errorTitle, 'error');
                showErrorDetail(errorTitle, errorMessage, errorDetails);
                alert(`${errorTitle}\n\n${errorMessage}\n\n${errorDetails.replace(/\\n/g, '\n')}`);
            });
    };

    // ─── ENTER KEY SUPPORT ──────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const active = document.activeElement;
            if (active && active.id === 'userInput') {
                e.preventDefault();
                searchUser();
            } else if (active && active.id === 'censusInput') {
                e.preventDefault();
                saveCensus();
            }
        }
    });

    // ─── INIT ──────────────────────────────────────────────────────
    window.addEventListener('load', () => {
        loadUserData();
    });

    window.loadUserData = loadUserData;
</script>

</body>
</html>
