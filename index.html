<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Module · GAS Direct</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #27ae60;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #2c3e50;
        }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 380px;
            text-align: center;
        }
        h2 {
            color: var(--text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        h2 small {
            font-size: 0.65rem;
            background: #eef2f7;
            padding: 2px 10px;
            border-radius: 20px;
            color: #3a5670;
        }
        input {
            padding: 12px;
            width: 90%;
            margin-bottom: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: 0.2s;
            box-sizing: border-box;
        }
        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }
        button {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
            font-size: 0.95rem;
        }
        button:hover {
            background: #357abd;
            transform: translateY(-2px);
        }
        button.secondary {
            background: var(--secondary);
        }
        button.secondary:hover {
            background: #1e8b4c;
        }
        button:disabled {
            opacity: 0.6;
            transform: none !important;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            font-size: 0.95rem;
        }
        .hidden {
            display: none !important;
        }
        #loading {
            color: #555;
            font-style: italic;
            padding: 10px 0;
        }
        #censusSection {
            margin-top: 20px;
        }
        hr {
            border: none;
            border-top: 2px dashed #dce3ec;
            margin: 20px 0 18px;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .label-hint {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1f2a3a;
        }
        #result.error {
            border-left-color: #e74c3c;
        }
        .toast-message {
            background: #1e2b3c;
            color: #f0f7ff;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-top: 12px;
            display: inline-block;
            max-width: 100%;
            word-break: break-word;
        }
        .toast-message.error-toast {
            background: #b3403a;
            color: white;
        }
        .toast-message.warning-toast {
            background: #b37a2e;
            color: white;
        }
        .debug-toggle {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #6a7a8e;
            cursor: pointer;
            text-decoration: underline dotted;
        }
        .error-detail {
            font-size: 0.8rem;
            background: #fde8e8;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 10px;
            color: #a93226;
            border: 1px solid #f5c6cb;
            text-align: left;
        }
        .error-detail strong {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>
        📋 Supervisor Module
        <small>GAS</small>
    </h2>

    <!-- loading indicator -->
    <div id="loading">⏳ Loading user data ...</div>

    <!-- search box -->
    <div id="searchBox" class="hidden">
        <input type="text" id="userInput" placeholder="Enter User ID (e.g. U001)">
        <button onclick="searchUser()">🔍 Search Profile</button>
    </div>

    <!-- profile result -->
    <div id="result" class="hidden"></div>

    <!-- census section -->
    <div id="censusSection" class="hidden">
        <hr>
        <div class="label-hint">🏠 Census House Number</div>
        <input type="text" id="censusInput" placeholder="e.g. H-12, 45/A">
        <button class="secondary" onclick="saveCensus()">✅ Submit Entry</button>
    </div>

    <!-- status / error messages -->
    <div id="statusMessage" class="toast-message hidden"></div>
    <div id="errorDetail" class="error-detail hidden"></div>

    <div class="debug-toggle" onclick="toggleDebug()">🛠 show raw data</div>
    <pre id="debugRaw" style="display:none; background:#f2f4f6; padding:8px; border-radius:8px; font-size:0.7rem; text-align:left; overflow-x:auto; margin-top:10px;"></pre>
</div>

<script>
    // ─── DIRECT GOOGLE APPS SCRIPT ENDPOINT ──────────────────────────
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwIUiDZr5e4AkFp3RYSqfATzsU7uxc9_S3ssKic2SzxKxIi8DM0TLz9_2J30TXSQq8/exec";

    // ─── STATE ────────────────────────────────────────────────────────
    let userData = [];             // full user list from GAS
    let currentUserId = "";        // id of selected user

    // ─── DOM refs ────────────────────────────────────────────────────
    const loadingEl = document.getElementById('loading');
    const searchBox = document.getElementById('searchBox');
    const userInput = document.getElementById('userInput');
    const resultDiv = document.getElementById('result');
    const censusSection = document.getElementById('censusSection');
    const censusInput = document.getElementById('censusInput');
    const statusMsg = document.getElementById('statusMessage');
    const errorDetail = document.getElementById('errorDetail');
    const debugRaw = document.getElementById('debugRaw');

    // ─── HELPERS ──────────────────────────────────────────────────────
    function showStatus(text, type = 'info') {
        statusMsg.classList.remove('hidden', 'error-toast', 'warning-toast');
        statusMsg.textContent = text;
        if (type === 'error') {
            statusMsg.classList.add('error-toast');
        } else if (type === 'warning') {
            statusMsg.classList.add('warning-toast');
        } else {
            statusMsg.style.background = '#1e2b3c';
            statusMsg.style.color = '#f0f7ff';
        }
        clearTimeout(statusMsg._timer);
        statusMsg._timer = setTimeout(() => {
            statusMsg.classList.add('hidden');
        }, 6000);
    }

    function showErrorDetail(title, message, details = '') {
        errorDetail.classList.remove('hidden');
        errorDetail.innerHTML = `
            <strong>❌ ${title}</strong>
            <div>${message}</div>
            ${details ? `<div style="margin-top:6px;font-size:0.75rem;opacity:0.8;">${details}</div>` : ''}
        `;
        // auto hide after 12s
        clearTimeout(errorDetail._timer);
        errorDetail._timer = setTimeout(() => {
            errorDetail.classList.add('hidden');
        }, 12000);
    }

    function hideErrorDetail() {
        errorDetail.classList.add('hidden');
    }

    function toggleDebug() {
        if (debugRaw.style.display === 'none') {
            debugRaw.style.display = 'block';
            debugRaw.textContent = JSON.stringify(userData, null, 2);
        } else {
            debugRaw.style.display = 'none';
        }
    }

    // ─── LOAD USER DATA FROM GAS (GET) ─────────────────────────────
    function loadUserData() {
        loadingEl.classList.remove('hidden');
        searchBox.classList.add('hidden');
        resultDiv.classList.add('hidden');
        censusSection.classList.add('hidden');
        hideErrorDetail();

        fetch(`${GAS_URL}?action=getUserData`)
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status} ${res.statusText}`);
                }
                return res.json();
            })
            .then(data => {
                if (Array.isArray(data)) {
                    userData = data;
                } else if (data && typeof data === 'object' && Array.isArray(data.data)) {
                    userData = data.data;
                } else {
                    throw new Error('Unexpected data format from GAS');
                }

                loadingEl.classList.add('hidden');
                searchBox.classList.remove('hidden');
                showStatus(`✅ Loaded ${userData.length} users`, 'info');
                debugRaw.textContent = JSON.stringify(userData, null, 2);
                debugRaw.style.display = 'none';
            })
            .catch(err => {
                console.error('Load error:', err);
                loadingEl.textContent = '❌ Error loading data.';
                loadingEl.style.color = '#c0392b';
                showStatus('Failed to load user data', 'error');
                showErrorDetail(
                    'Data Load Failed',
                    'Could not fetch user list from Google Apps Script.',
                    `Error: ${err.message}. Check that the GAS URL is correct and CORS is enabled.`
                );
            });
    }

    // ─── SEARCH USER ──────────────────────────────────────────────────
    window.searchUser = function() {
        const input = userInput.value.trim();
        resultDiv.classList.remove('hidden');
        resultDiv.className = '';
        hideErrorDetail();

        if (!input) {
            resultDiv.innerHTML = '<span style="color:#e67e22;">Please enter a User ID.</span>';
            censusSection.classList.add('hidden');
            return;
        }

        const user = userData.find(u => u.id && u.id.toString().toLowerCase() === input.toLowerCase());

        if (user) {
            currentUserId = user.id;
            resultDiv.className = '';
            let html = `<p><strong>👤 Functionary:</strong> ${user.typeOfFunctionary || '—'}</p>
                        <p><strong>📛 Name:</strong> ${user.name || '—'}</p>
                        <p><strong>🏛️ District/M.Corp.:</strong> ${user.district || '—'}</p>
                        <p><strong>📍 Sub-District:</strong> ${user.subDistrict || '—'}</p>`;
            if (user.town && user.town.toString().trim() !== '') {
                html += `<p><strong>🏘️ Town:</strong> ${user.town}</p>`;
            }
            resultDiv.innerHTML = html;
            censusSection.classList.remove('hidden');
            censusInput.value = '';
            showStatus(`🔍 Profile: ${user.name || user.id}`, 'info');
        } else {
            resultDiv.className = 'error';
            resultDiv.innerHTML = `<span style="color:#e74c3c;">❌ User ID "${input}" not found.</span>`;
            censusSection.classList.add('hidden');
            showStatus('User not found', 'warning');
        }
    };

    // ─── SAVE CENSUS DATA (POST) ─────────────────────────────────────
    window.saveCensus = function() {
        const houseNo = censusInput.value.trim();
        if (!houseNo) {
            alert('Please enter a House Number.');
            return;
        }
        if (!currentUserId) {
            alert('No user selected. Please search a valid profile first.');
            return;
        }

        const payload = {
            action: 'saveCensusData',
            userId: currentUserId,
            houseNo: houseNo
        };

        const btn = document.querySelector('#censusSection .secondary');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '⏳ Saving...';
        hideErrorDetail();

        // Add a timeout to detect network hangs
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s timeout

        fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: controller.signal
        })
            .then(res => {
                clearTimeout(timeoutId);
                if (!res.ok) {
                    // Try to get error text from response
                    return res.text().then(text => {
                        let errorMsg = `HTTP ${res.status} ${res.statusText}`;
                        try {
                            const json = JSON.parse(text);
                            if (json.message) errorMsg = json.message;
                        } catch (_) {
                            if (text) errorMsg = text.substring(0, 200);
                        }
                        throw new Error(errorMsg);
                    });
                }
                return res.json();
            })
            .then(result => {
                btn.disabled = false;
                btn.textContent = originalText;
                if (result && result.success === true) {
                    showStatus('✅ Census data saved successfully!', 'info');
                    censusInput.value = '';
                    userInput.value = '';
                    resultDiv.classList.add('hidden');
                    censusSection.classList.add('hidden');
                    currentUserId = '';
                    hideErrorDetail();
                } else {
                    const msg = result?.message || 'Unknown error from GAS';
                    showStatus('❌ ' + msg, 'error');
                    showErrorDetail(
                        'Save Failed (GAS Response)',
                        msg,
                        'The Google Apps Script returned an error status.'
                    );
                }
            })
            .catch(err => {
                clearTimeout(timeoutId);
                btn.disabled = false;
                btn.textContent = originalText;

                console.error('Save error:', err);

                // Detailed error analysis
                let errorTitle = 'Network Error';
                let errorMessage = 'Failed to connect to Google Apps Script.';
                let errorDetails = '';

                if (err.name === 'AbortError') {
                    errorTitle = 'Request Timeout';
                    errorMessage = 'The request took too long (over 15 seconds).';
                    errorDetails = 'The GAS endpoint may be slow or unavailable.';
                } else if (err.message.includes('Failed to fetch')) {
                    errorTitle = 'Connection Failed';
                    errorMessage = 'Cannot reach the Google Apps Script endpoint.';
                    errorDetails = `Possible causes:\n• CORS not enabled on the GAS deployment\n• Incorrect script URL: ${GAS_URL}\n• Network blockage (firewall/VPN)\n• GAS script is not published or deployed`;
                } else if (err.message.includes('HTTP')) {
                    errorTitle = 'Server Error';
                    errorMessage = err.message;
                    errorDetails = 'The GAS endpoint returned an HTTP error status.';
                } else {
                    errorTitle = 'Unexpected Error';
                    errorMessage = err.message || 'Unknown error';
                    errorDetails = 'Check the browser console for more details.';
                }

                showStatus(`❌ ${errorTitle}`, 'error');
                showErrorDetail(errorTitle, errorMessage, errorDetails);

                // Also show a more user-friendly alert
                alert(`❌ ${errorTitle}\n\n${errorMessage}\n\n${errorDetails.replace(/\\n/g, '\n')}`);
            });
    };

    // ─── ENTER KEY SUPPORT ──────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const active = document.activeElement;
            if (active && active.id === 'userInput') {
                e.preventDefault();
                searchUser();
            } else if (active && active.id === 'censusInput') {
                e.preventDefault();
                saveCensus();
            }
        }
    });

    // ─── INIT ──────────────────────────────────────────────────────
    window.addEventListener('load', () => {
        loadUserData();
    });

    // expose for manual retry
    window.loadUserData = loadUserData;
</script>
</body>
</html>
