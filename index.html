<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervisor Module</title>
  <style>
    :root {
      --primary: #4a90e2;
      --secondary: #27ae60;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #2c3e50;
    }
    body {
      margin: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      min-height: 100vh; 
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
    }
    .container {
      background: var(--card); 
      padding: 30px; 
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
      width: 350px; 
      text-align: center;
    }
    h2 { color: var(--text); margin-bottom: 20px; }
    input { padding: 12px; width: 90%; margin-bottom: 15px; border: 2px solid #e1e8ed; border-radius: 10px; }
    button { 
      padding: 12px 25px; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 600; 
      transition: transform 0.2s;
    }
    button:hover { background: #357abd; transform: translateY(-2px); }
    #result { 
      margin-top: 20px; 
      text-align: left; 
      background: #f8f9fa; 
      padding: 15px; 
      border-radius: 10px; 
      border-left: 4px solid var(--primary); 
    }
    .hidden { display: none; }
    #loading { color: #555; font-style: italic; }
  </style>

  <!-- jQuery Library -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <div class="container">
    <h2>Supervisor Module</h2>
    <div id="loading">Loading data...</div>
    
    <div id="searchBox" class="hidden">
      <input type="text" id="userInput" placeholder="Enter User ID">
      <button id="searchBtn">Search Profile</button>
    </div>
    
    <div id="result" class="hidden"></div>

    <div id="censusSection" class="hidden" style="margin-top: 20px;">
      <hr>
      <label><strong>Census House Number:</strong></label><br><br>
      <input type="text" id="censusInput" placeholder="Enter Number...">
      <br>
      <button id="saveCensusBtn" style="background: var(--secondary);">Submit Entry</button>
    </div>
  </div>

  <script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbw9rb9GViIvd4dkevQS7W6L5EVOAJ45WWMd9lHbz53t-nulPm9OpNRx1H6wCVMFTuXM/exec';
    let userData = [];
    let currentUserId = "";

    $(document).ready(function() {
      // 1. Fetch initial user list from Google Apps Script
      $.ajax({
        url: scriptUrl + '?action=getUserData',
        type: 'GET',
        dataType: 'json',
        success: function(data) {
          userData = data || [];
          $('#loading').addClass('hidden');
          $('#searchBox').removeClass('hidden');
        },
        error: function(xhr, status, error) {
          console.error('Error loading data:', error);
          $('#loading').text("Error loading system data.");
        }
      });

      // 2. Render User Profile
      function renderUserProfile(user) {
        const $resultDiv = $('#result');
        $resultDiv.removeClass('hidden');
        
        let html = `<p><strong>Functionary:</strong> ${user.typeOfFunctionary}</p>
                    <p><strong>Name:</strong> ${user.name}</p>
                    <p><strong>District/M.Corp.:</strong> ${user.district}</p>
                    <p><strong>Sub-District:</strong> ${user.subDistrict}</p>`;
        
        if (user.town && String(user.town).trim() !== "") {
          html += `<p><strong>Town:</strong> ${user.town}</p>`;
        }

        html += `<p><strong>Total House Entered earlier:</strong> <span id="totalHousesCount" style="color: var(--secondary); font-weight: bold;">${user.totalHouses}</span></p>`;
        
        $resultDiv.html(html);
        $('#censusSection').removeClass('hidden');
      }

      // 3. Search User Event
      $('#searchBtn').on('click', function() {
        const input = $('#userInput').val().trim();
        const $resultDiv = $('#result');
        const user = userData.find(u => String(u.id) === input);

        if (user) {
          currentUserId = user.id;
          renderUserProfile(user);
        } else {
          $resultDiv.removeClass('hidden');
          $resultDiv.html("<span style='color:#e74c3c;'>User ID not found.</span>");
          $('#censusSection').addClass('hidden');
        }
      });

      // 4. Save Census Data Event
      $('#saveCensusBtn').on('click', function() {
        const houseNo = $('#censusInput').val().trim();
        if(!houseNo) { 
          alert("Please enter a House No."); 
          return; 
        }

        const payload = JSON.stringify({
          action: 'saveCensusData',
          userId: currentUserId,
          houseNo: houseNo
        });

        $.ajax({
          url: scriptUrl,
          type: 'POST',
          data: payload,
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Prevents CORS preflight issues with GAS
          dataType: 'json',
          success: function(result) {
            if (result && result.success) {
              alert("Successfully saved!");
              
              // Update local user data record for total houses count
              const user = userData.find(u => String(u.id) === String(currentUserId));
              if (user) {
                user.totalHouses = result.totalHouses;
                renderUserProfile(user); // Re-render profile with updated count
              }
              
              $('#censusInput').val('');
            } else {
              alert("Error saving data: " + (result.message || "Unknown error"));
            }
          },
          error: function(xhr, status, error) {
            console.error('Error:', error);
            alert("Network error while trying to save.");
          }
        });
      });
    });
  </script>
</body>
</html>
